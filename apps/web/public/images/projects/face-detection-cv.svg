<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" font-family="Outfit, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/><stop offset="1" stop-color="#0e1330"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="silh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3358"/><stop offset="1" stop-color="#171d3a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#glow)"/>

  <!-- faint scan grid -->
  <g stroke="#7c86b8" stroke-opacity="0.06">
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="42" x2="1200" y2="42"/><line x1="0" y1="84" x2="1200" y2="84"/><line x1="0" y1="126" x2="1200" y2="126"/><line x1="0" y1="168" x2="1200" y2="168"/><line x1="0" y1="210" x2="1200" y2="210"/><line x1="0" y1="252" x2="1200" y2="252"/><line x1="0" y1="294" x2="1200" y2="294"/><line x1="0" y1="336" x2="1200" y2="336"/><line x1="0" y1="378" x2="1200" y2="378"/><line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="462" x2="1200" y2="462"/><line x1="0" y1="504" x2="1200" y2="504"/><line x1="0" y1="546" x2="1200" y2="546"/><line x1="0" y1="588" x2="1200" y2="588"/><line x1="0" y1="630" x2="1200" y2="630"/><line x1="0" y1="672" x2="1200" y2="672"/><line x1="0" y1="714" x2="1200" y2="714"/>
    <line x1="0" y1="0" x2="0" y2="750"/><line x1="42" y1="0" x2="42" y2="750"/><line x1="84" y1="0" x2="84" y2="750"/><line x1="126" y1="0" x2="126" y2="750"/><line x1="168" y1="0" x2="168" y2="750"/><line x1="210" y1="0" x2="210" y2="750"/><line x1="252" y1="0" x2="252" y2="750"/><line x1="294" y1="0" x2="294" y2="750"/><line x1="336" y1="0" x2="336" y2="750"/><line x1="378" y1="0" x2="378" y2="750"/><line x1="420" y1="0" x2="420" y2="750"/><line x1="462" y1="0" x2="462" y2="750"/><line x1="504" y1="0" x2="504" y2="750"/><line x1="546" y1="0" x2="546" y2="750"/><line x1="588" y1="0" x2="588" y2="750"/><line x1="630" y1="0" x2="630" y2="750"/><line x1="672" y1="0" x2="672" y2="750"/><line x1="714" y1="0" x2="714" y2="750"/><line x1="756" y1="0" x2="756" y2="750"/><line x1="798" y1="0" x2="798" y2="750"/><line x1="840" y1="0" x2="840" y2="750"/><line x1="882" y1="0" x2="882" y2="750"/><line x1="924" y1="0" x2="924" y2="750"/><line x1="966" y1="0" x2="966" y2="750"/><line x1="1008" y1="0" x2="1008" y2="750"/><line x1="1050" y1="0" x2="1050" y2="750"/><line x1="1092" y1="0" x2="1092" y2="750"/><line x1="1134" y1="0" x2="1134" y2="750"/><line x1="1176" y1="0" x2="1176" y2="750"/>
  </g>

  <!-- person silhouette (head + shoulders), centred -->
  <g transform="translate(600,470)">
    <path d="M-190,150 C-190,40 -110,-20 0,-20 C110,-20 190,40 190,150 Z" fill="url(#silh)"/>
    <ellipse cx="0" cy="-90" rx="118" ry="140" fill="url(#silh)"/>
  </g>

  <!-- detection bounding box + corner brackets -->
  <g stroke="#22c55e" fill="none">
    <rect x="466" y="250" width="268" height="300" rx="4" stroke-opacity="0.55" stroke-width="2"/>
    <g stroke-width="6" stroke-linecap="round">
      <path d="M466,286 L466,250 L502,250"/>
      <path d="M698,250 L734,250 L734,286"/>
      <path d="M734,514 L734,550 L698,550"/>
      <path d="M502,550 L466,550 L466,514"/>
    </g>
  </g>
  <!-- facial landmark dots -->
  <g fill="#22c55e">
    <circle cx="545" cy="360" r="6"/><circle cx="655" cy="360" r="6"/>
    <circle cx="600" cy="420" r="6"/>
    <circle cx="560" cy="470" r="6"/><circle cx="640" cy="470" r="6"/>
  </g>

  <!-- REC indicator -->
  <g transform="translate(56,52)">
    <circle cx="10" cy="4" r="9" fill="#ef4444"/>
    <text x="30" y="11" fill="#e2e8f0" font-size="26" font-weight="700" letter-spacing="2">REC</text>
    <text x="110" y="11" fill="#62759f" font-size="22" letter-spacing="3">WEBCAM · REAL-TIME</text>
  </g>

  <!-- confidence pill -->
  <g transform="translate(56,632)">
    <rect x="0" y="0" width="470" height="62" rx="31" fill="#0f1a12" stroke="#22c55e" stroke-opacity="0.5"/>
    <circle cx="34" cy="31" r="13" fill="#22c55e"/>
    <path d="M28,31 l4,5 l8,-10" stroke="#0a0e1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="40" fill="#ffffff" font-size="24" font-weight="700">FACE DETECTED</text>
    <text x="270" y="40" fill="#8bffb0" font-size="22" font-family="Plus Jakarta Sans, Arial">Confidence: 98.63%</text>
  </g>

  <!-- stack tag -->
  <text x="1144" y="700" text-anchor="end" fill="#62759f" font-size="22" font-family="Plus Jakarta Sans, Arial">Python · OpenCV · Haar Cascade</text>
</svg>